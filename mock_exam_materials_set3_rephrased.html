<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mock Exam Set 3</title>
<style>
:root {
  --bg:#f6f7fb; --card:#ffffff; --text:#1f2937; --muted:#6b7280;
  --blue:#2f5bd4; --green:#16a34a; --greenbg:#e9f8ef; --red:#dc2626; --redbg:#fdecec; --border:#e5e7eb;
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text)}
.wrap{max-width:1100px;margin:28px auto;padding:0 16px}
.topbar{background:var(--card);border-radius:22px;padding:16px 18px;box-shadow:0 10px 24px rgba(0,0,0,.05);position:sticky;top:12px;z-index:10}
.progress-row{display:flex;align-items:center;gap:14px}
.progress{flex:1;height:12px;background:#e6eaf5;border-radius:999px;overflow:hidden}
.progress > div{height:100%;background:var(--blue);width:0%}
.counter{font-weight:700;min-width:88px;text-align:right}
.scorebox{display:flex;gap:10px;align-items:center}
.badge{padding:8px 14px;border-radius:999px;font-weight:700}
.badge.red{background:#f8e2de;color:#9f2f22}
.badge.green{background:#dff1df;color:#1f7a3d}
.panel{background:var(--card);border-radius:22px;padding:22px;box-shadow:0 10px 24px rgba(0,0,0,.05);margin-top:16px}
.tags{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.tag{background:#edf2ff;color:#3b4a6b;padding:10px 16px;border-radius:999px;font-weight:700;font-size:14px}
.qcard{background:#fafafa;border:1px solid var(--border);border-radius:20px;padding:18px 18px 16px}
.qhead{font-size:31px;font-weight:800;margin-bottom:8px}
.meta{color:var(--muted);font-size:14px;margin-bottom:6px}
.question{font-size:19px;line-height:1.55;margin:10px 0 16px;font-weight:700}
.option{width:100%;text-align:left;border:none;background:#eef0f6;padding:18px 18px;border-radius:18px;margin:12px 0;font-size:18px;cursor:pointer;transition:.15s}
.option:hover{transform:translateY(-1px)}
.option.selected{outline:3px solid #b8c7ff;background:#f5f7ff}
.option.correct{background:var(--greenbg);outline:3px solid var(--green)}
.option.wrong{background:var(--redbg);outline:3px solid var(--red)}
.feedback{margin-top:14px;padding:18px;border-radius:18px;background:#fff7f7;border:1px solid #f3d5d5;display:none}
.feedback.ok{background:#eefaf2;border-color:#caebd6}
.feedback .label{font-weight:800;margin-bottom:6px}
.actions{display:flex;justify-content:space-between;align-items:center;margin-top:18px}
.btn{border:none;border-radius:18px;padding:16px 22px;font-size:18px;font-weight:800;cursor:pointer}
.btn.primary{background:var(--blue);color:#fff}
.btn.secondary{background:#e8edf8;color:#4761a8}
.btn:disabled{opacity:.45;cursor:not-allowed}
.summary{display:none}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sumcard{background:#fafafa;border:1px solid var(--border);border-radius:18px;padding:16px}
.missed-list .item{background:#fafafa;border:1px solid var(--border);border-radius:18px;padding:16px;margin-top:14px}
.small{font-size:14px;color:var(--muted)}
@media (max-width:760px){.qhead{font-size:24px}.grid{grid-template-columns:1fr}.question{font-size:17px}.option{font-size:16px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="progress-row">
      <div class="progress"><div id="bar"></div></div>
      <div class="counter" id="counter">1 / 100</div>
      <div class="scorebox">
        <div class="badge red">✕ <span id="wrongCount">0</span></div>
        <div class="badge green">✓ <span id="rightCount">0</span></div>
      </div>
    </div>
  </div>

  <div class="panel" id="startPanel">
    <div class="tags">
      <div class="tag">โลหะและอบชุบ</div><div class="tag">พอลิเมอร์</div><div class="tag">คอมโพสิต</div>
      <div class="tag">เซรามิก</div><div class="tag">กระบวนการผลิต</div>
    </div>
    <p style="font-size:18px;line-height:1.6;margin:0 0 16px">
      ชุดนี้เปลี่ยนคำถามใหม่และเรียบเรียงใหม่ให้ใกล้แนวข้อสอบจริงจากไฟล์ที่เธอส่งมากขึ้น เน้นนิยามตรง เปรียบเทียบคำที่ชอบสับสน
      และตัวลวงที่พอเจอในข้อสอบจริงได้
    </p>
    <button class="btn primary" id="startBtn">เริ่มทำข้อสอบ</button>
  </div>

  <div class="panel" id="quizPanel" style="display:none">
    <div class="qcard">
      <div class="qhead" id="qnum"></div>
      <div class="meta" id="qcat"></div>
      <div class="question" id="question"></div>
      <div id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="actions">
        <button class="btn secondary" id="prevBtn">ย้อนกลับ</button>
        <div style="display:flex;gap:10px">
          <button class="btn secondary" id="resetThisBtn">ล้างคำตอบ</button>
          <button class="btn primary" id="nextBtn">ข้อต่อไป</button>
        </div>
      </div>
    </div>
  </div>

  <div class="panel summary" id="summaryPanel">
    <h2 style="margin-top:0">สรุปคะแนน</h2>
    <div class="grid">
      <div class="sumcard"><div class="small">คะแนนรวม</div><div style="font-size:34px;font-weight:800" id="finalScore"></div></div>
      <div class="sumcard"><div class="small">เปอร์เซ็นต์</div><div style="font-size:34px;font-weight:800" id="finalPct"></div></div>
    </div>
    <div class="sumcard" style="margin-top:14px">
      <div class="small">คะแนนแยกตามหัวข้อ</div>
      <div id="byCat" style="margin-top:10px;line-height:1.8"></div>
    </div>
    <div class="missed-list" id="missed"></div>
    <div style="margin-top:18px"><button class="btn primary" onclick="location.reload()">เริ่มใหม่</button></div>
  </div>
</div>

<script>
const questions = [{"cat": "Metal", "q": "จากแนวคิด TTT diagram ถ้านำเหล็กยูเทคทอยด์ไปแช่คงอุณหภูมิบริเวณ 650°C จนการเปลี่ยนเฟสเสร็จสมบูรณ์ โครงสร้างสุดท้ายควรเป็นข้อใด", "choices": ["100% coarse pearlite", "100% bainite", "100% martensite", "tempered martensite"], "a": 0, "ex": "ช่วงอุณหภูมิสูงในเขต pearlite ให้ coarse pearlite"}, {"cat": "Metal", "q": "หากแช่เหล็กยูเทคทอยด์ที่ 400°C ชั่วเวลาหนึ่งจนเริ่มเกิด bainite แล้วจึง quench ทันที โครงสร้างสุดท้ายมีแนวโน้มเป็นข้อใด", "choices": ["bainite ล้วน", "bainite + martensite", "fine pearlite ล้วน", "austenite ล้วน"], "a": 1, "ex": "ส่วนที่เกิด bainite แล้วคงเป็น bainite ส่วน austenite ที่เหลือจะกลายเป็น martensite หลัง quench"}, {"cat": "Metal", "q": "ข้อความใดอธิบายความต่างระหว่าง TTT และ CCT ได้ถูกต้องที่สุด", "choices": ["TTT ใช้กับการเย็นต่อเนื่อง ส่วน CCT ใช้กับการแช่คงอุณหภูมิ", "TTT ใช้กับการแช่อุณหภูมิคงที่ ส่วน CCT ใช้กับการเย็นต่อเนื่อง", "TTT ใช้ได้เฉพาะกับ martensite แต่ CCT ใช้กับ pearlite", "TTT และ CCT ให้ผลเหมือนกันทุกกรณี"], "a": 1, "ex": "TTT = isothermal transformation, CCT = continuous cooling"}, {"cat": "Metal", "q": "จุดประสงค์หลักของการ quench ในการผลิต martensitic steel คือข้อใด", "choices": ["ทำให้ austenite มีเวลามากพอเปลี่ยนเป็น pearlite", "หลบเขต pearlite/bainite เพื่อให้เกิด martensite มากขึ้น", "ทำให้ cementite กลมตัว", "ลดความเค้นตกค้างโดยตรง"], "a": 1, "ex": "ต้องเย็นเร็วพอหลบ nose ของ pearlite/bainite"}, {"cat": "Metal", "q": "ข้อใดกล่าวถึง martensite ได้ถูกต้องที่สุด", "choices": ["เป็นโครงสร้างจากการเปลี่ยนเฟสแบบ diffusionless", "เกิดเฉพาะเมื่อแช่ที่อุณหภูมิสูงกว่า A1 นานๆ", "มีความเหนียวสูงกว่าทุกโครงสร้าง", "เกิดจาก ferrite + cementite เรียงเป็นชั้น"], "a": 0, "ex": "martensite เกิดแบบ diffusionless จากการเย็นเร็ว"}, {"cat": "Metal", "q": "ข้อใดเป็นผลทั่วไปของ tempering หลัง quench", "choices": ["martensite เปลี่ยนกลับเป็น austenite ทั้งหมด", "ลด brittleness และเพิ่ม toughness", "เพิ่ม hardness สูงสุดเสมอ", "ทำให้เกิด coarse pearlite"], "a": 1, "ex": "tempering ลดความเปราะและปรับสมบัติให้ใช้งานได้ดีขึ้น"}, {"cat": "Metal", "q": "ถ้าต้องการให้เหล็กนิ่มที่สุดและ machinability ดีมาก โดยเฉพาะเหล็กคาร์บอนสูง ควรเลือกกระบวนการใด", "choices": ["Normalizing", "Full anneal", "Spheroidizing", "Quenching"], "a": 2, "ex": "spheroidizing ทำให้ cementite กลม ช่วยให้นิ่มและกลึงง่าย"}, {"cat": "Metal", "q": "Normalizing ต่างจาก full anneal อย่างเด่นที่สุดในข้อใด", "choices": ["normalizing ใช้ต่ำกว่า A1 เสมอ", "normalizing ปล่อยเย็นในอากาศ จึงให้โครงสร้างละเอียดกว่า", "full anneal ทำให้แข็งกว่าเสมอ", "full anneal ต้อง quench ในน้ำ"], "a": 1, "ex": "normalizing เย็นในอากาศเร็วกว่า จึงละเอียดและแข็งกว่า full anneal"}, {"cat": "Metal", "q": "คำว่า hardenability หมายถึงข้อใด", "choices": ["ความต้านทานการกดของผิวโลหะ", "ความสามารถของเหล็กในการเกิด martensite ลึกเข้าไปในชิ้นงาน", "ความเหนียวหลัง tempering", "อัตราการเกิด pearlite"], "a": 1, "ex": "hardenability ไม่ใช่ hardness แต่เป็นความสามารถในการชุบให้แข็งลึก"}, {"cat": "Metal", "q": "ในการทดสอบ Jominy end-quench ค่าที่วัดตามตำแหน่งจากปลายชุบคือข้อใด", "choices": ["elastic modulus", "hardness", "thermal expansion", "electrical conductivity"], "a": 1, "ex": "Jominy วัด hardenability โดยดู hardness ตามระยะจากปลายชุบ"}, {"cat": "Metal", "q": "ถ้า hardenability curve ของเหล็กชนิดหนึ่งตกลงช้ามากเมื่อห่างจากปลายชุบ แปลว่าอย่างไร", "choices": ["มี carbon ต่ำมาก", "มี hardenability สูง", "ไม่มี martensite ที่ปลายชุบ", "ชุบไม่ได้"], "a": 1, "ex": "hardness คงอยู่ไกล แสดงว่าชุบแข็งลึกได้"}, {"cat": "Metal", "q": "ข้อใดเป็นลักษณะเด่นของ bainite เมื่อเทียบกับ pearlite", "choices": ["เกิดที่อุณหภูมิสูงกว่า pearlite มาก", "ละเอียดกว่าและมักแข็งกว่า pearlite", "เป็นโครงสร้าง diffusionless", "ประกอบด้วย austenite ล้วน"], "a": 1, "ex": "bainite เกิดต่ำกว่า pearlite และละเอียดกว่า"}, {"cat": "Metal", "q": "หากอัตราการเย็นไม่เร็วพอจะหลบ nose ของ pearlite บน TTT diagram สิ่งใดมักเกิดก่อน", "choices": ["martensite", "tempered martensite", "pearlite/bainite", "spheroidite"], "a": 2, "ex": "ถ้าผ่าน nose จะเริ่มเกิด pearlite/bainite ก่ let idx = 0;
let answers = Array(questions.length).fill(null);
let checked = Array(questions.length).fill(false);
const bar = document.getElementById('bar');
const counter = document.getElementById('counter');
const wrongCount = document.getElementById('wrongCount');
const rightCount = document.getElementById('rightCount');
const startPanel = document.getElementById('startPanel');
const quizPanel = document.getElementById('quizPanel');
const summaryPanel = document.getElementById('summaryPanel');
const qnum = document.getElementById('qnum');
const qcat = document.getElementById('qcat');
const questionEl = document.getElementById('question');
const optionsEl = document.getElementById('options');
const feedbackEl = document.getElementById('feedback');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const resetThisBtn = document.getElementById('resetThisBtn');

document.getElementById('startBtn').onclick = ()=>{startPanel.style.display='none';quizPanel.style.display='block';render();};

function updateCounts(){
  let r=0,w=0;
  checked.forEach((c,i)=>{if(c){if(answers[i]===questions[i].a) r++; else w++;}});
  rightCount.textContent=r; wrongCount.textContent=w;
}

function render(){
  const q = questions[idx];
  counter.textContent = `${idx+1} / ${questions.length}`;
  bar.style.width = `${((idx+1)/questions.length)*100}%`;
  qnum.textContent = `ข้อ ${idx+1}`;
  qcat.textContent = `[${q.cat}]`;
  questionEl.textContent = q.q;
  optionsEl.innerHTML='';
  q.choices.forEach((ch,i)=>{
    const btn=document.createElement('button');
    btn.className='option';
    const thai=['ก.','ข.','ค.','ง.','จ.'][i]||'';
    btn.textContent=`${thai} ${ch}`;
    if(answers[idx]===i) btn.classList.add('selected');
    if(checked[idx]){
      if(i===q.a) btn.classList.add('correct');
      if(answers[idx]===i && answers[idx]!==q.a) btn.classList.add('wrong');
      btn.disabled=true;
    }
    btn.onclick=()=>{answers[idx]=i; checked[idx]=true; updateCounts(); render();};
    optionsEl.appendChild(btn);
  });
  if(checked[idx]){
    const ok=answers[idx]===q.a;
    feedbackEl.style.display='block';
    feedbackEl.className='feedback '+(ok?'ok':'');
    const thai=['ก.','ข.','ค.','ง.','จ.'][q.a]||'';
    feedbackEl.innerHTML=`<div class="label">${ok ? 'ตอบถูก ✓' : 'ตอบผิด ✕'}</div>
      <div><b>เฉลย:</b> ${thai} ${q.choices[q.a]}</div>
      <div style="margin-top:6px">${q.ex}</div>`;
  } else {
    feedbackEl.style.display='none';
    feedbackEl.innerHTML='';
  }
  prevBtn.disabled = idx===0;
  nextBtn.textContent = idx===questions.length-1 ? 'สรุปคะแนน' : 'ข้อต่อไป';
}

prevBtn.onclick=()=>{if(idx>0){idx--;render();}};
nextBtn.onclick=()=>{if(idx===questions.length-1){finish();}else{idx++;render();}};
resetThisBtn.onclick=()=>{answers[idx]=null;checked[idx]=false;updateCounts();render();};

function finish(){
  quizPanel.style.display='none';
  summaryPanel.style.display='block';
  let correct=0;
  questions.forEach((q,i)=>{if(checked[i] && answers[i]===q.a) correct++;});
  const pct=(correct/questions.length*100).toFixed(1);
  document.getElementById('finalScore').textContent=`${correct} / ${questions.length}`;
  document.getElementById('finalPct').textContent=`${pct}%`;
  const catMap={};
  questions.forEach((q,i)=>{if(!catMap[q.cat]) catMap[q.cat]={t:0,c:0}; catMap[q.cat].t++; if(answers[i]===q.a) catMap[q.cat].c++;});
  document.getElementById('byCat').innerHTML = Object.entries(catMap).map(([k,v])=>`<div><b>${k}</b>: ${v.c} / ${v.t}</div>`).join('');
  const missed=document.getElementById('missed');
  missed.innerHTML='<h3>ข้อที่ตอบผิด</h3>';
  questions.forEach((q,i)=>{
    if(answers[i]!==q.a){
      const thai=['ก.','ข.','ค.','ง.','จ.'][q.a]||'';
      const your = answers[i]===null ? 'ไม่ได้ตอบ' : ((['ก.','ข.','ค.','ง.','จ.'][answers[i]]||'')+' '+q.choices[answers[i]]);
      const div=document.createElement('div');
      div.className='item';
      div.innerHTML=`<div style="font-weight:800">ข้อ ${i+1} [${q.cat}]</div>
        <div style="margin:6px 0">${q.q}</div>
        <div style="color:#b42318"><b>คำตอบของเธอ:</b> ${your}</div>
        <div style="color:#166534;margin-top:4px"><b>เฉลย:</b> ${thai} ${q.choices[q.a]}</div>
        <div style="margin-top:4px" class="small">${q.ex}</div>`;
      missed.appendChild(div);
    }
  });
}
updateCounts();
</script>
</body></html>
